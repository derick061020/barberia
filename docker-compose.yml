# =============================================================================
# Barbería Wallet — stack simple para Portainer
#
# Cómo desplegar:
#   1. Stacks → Add stack → pega este YAML.
#   2. (Opcional) Cambia solo la línea APP_URL por tu dominio real.
#   3. Deploy. Nada más: el contenedor descarga el código solo.
#
# SSL/HTTPS lo pone Cloudflare por delante; aquí solo servimos HTTP en el puerto 8080.
# =============================================================================

x-env: &env
  APP_NAME: "Barbería Wallet"
  APP_ENV: production
  APP_DEBUG: "false"

  # >>> ÚNICO valor que quizá quieras cambiar: tu URL pública HTTPS (la de Cloudflare)
  APP_URL: "https://wallet.tudominio.com"

  APP_KEY: "base64:a35wBbuD1BDdOuwTgfIApC6FjDGAi9maRmitcNtzXyU="

  TRUSTED_PROXIES: "*"

  DB_CONNECTION: sqlite
  DB_DATABASE: /app/database/database.sqlite

  QUEUE_CONNECTION: database
  SESSION_DRIVER: database
  CACHE_STORE: database
  LOG_CHANNEL: stderr
  LOG_LEVEL: warning

services:
  # 1) Init: descarga el código, instala dependencias y migra la BD. Corre una vez.
  init:
    image: webdevops/php-nginx:8.4-alpine
    working_dir: /app
    environment: *env
    volumes:
      - app:/app
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        set -e
        git config --global --add safe.directory /app
        if [ ! -f /app/composer.json ]; then
          apk add --no-cache git
          git clone https://github.com/derick061020/barberia.git /app
        fi
        composer install --no-dev --optimize-autoloader --no-interaction
        mkdir -p storage/app/passkit/certs storage/app/passkit/assets \
                 storage/framework/cache storage/framework/sessions storage/framework/views \
                 storage/logs bootstrap/cache database
        [ -f database/database.sqlite ] || touch database/database.sqlite
        php artisan migrate --force
        php artisan config:cache
        php artisan route:cache
        php artisan view:cache
        chown -R application:application storage bootstrap/cache database 2>/dev/null || true
    restart: "no"

  # 2) Web: sirve el panel + los pases (Cloudflare pone el HTTPS delante).
  app:
    image: webdevops/php-nginx:8.4-alpine
    working_dir: /app
    depends_on:
      init:
        condition: service_completed_successfully
    environment:
      <<: *env
      WEB_DOCUMENT_ROOT: /app/public
    volumes:
      - app:/app
    ports:
      # host:contenedor — la imagen webdevops sirve nginx en el 80
      - "1081:80"
    restart: unless-stopped

  # 3) Worker: procesa la cola (push APNs de Apple).
  worker:
    image: webdevops/php-nginx:8.4-alpine
    working_dir: /app
    depends_on:
      init:
        condition: service_completed_successfully
    environment: *env
    volumes:
      - app:/app
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    restart: unless-stopped

volumes:
  app:
